name: portfolio
description: "A modern Flutter portfolio app designed to showcase professional experience, technical skills, and completed projects."

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter_web_plugins:
    sdk: flutter
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  responsive_framework: ^1.5.1
  flutter_screenutil_plus: ^1.5.0
  go_router: ^16.0.0
  google_fonts: ^8.1.0
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.4
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  emailjs: ^4.0.0
  cloud_firestore: ^5.6.0
  firebase_core: ^3.13.0
  visibility_detector: ^0.4.0+2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/
