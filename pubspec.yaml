name: portfolio
description: "A modern Flutter portfolio app designed to showcase professional experience, technical skills, and completed projects."

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter_web_plugins:
    sdk: flutter
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  responsive_framework: ^1.5.1
  go_router: ^16.0.0
  url_launcher: ^6.3.2
  http: ^1.6.0
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.0
  flutter_bloc: ^9.1.1
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/images/projects/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
